set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Claude Code activity indicator in window tabs.
# @claude_state is set per window by ~/.claude/hooks/tmux-claude-status.sh
# (driven by Claude Code hooks): "busy" while working, "waiting" when it
# needs input, unset when idle.
# The braille frame is animated by ~/.claude/hooks/tmux-claude-spinner.sh
# (falls back to a static ✳ if the spinner daemon is not running).
set -g @theme_active_window_title   "#{?#{==:#{@claude_state},busy},#[fg=yellow]#{?#{@claude_spinner_frame},#{@claude_spinner_frame},✳} #[fg=#ffffff],}#{?#{==:#{@claude_state},waiting},#[fg=orange]󰂚 #[fg=#ffffff],}#W "
set -g @theme_inactive_window_title "#{?#{==:#{@claude_state},busy},#[fg=yellow]#{?#{@claude_spinner_frame},#{@claude_spinner_frame},✳} #[fg=#ffffff],}#{?#{==:#{@claude_state},waiting},#[fg=orange]󰂚 #[fg=#ffffff],}#W "

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the --very bottom-- of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

