set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# previous theme plugin (tokyo-night) with its Claude-indicator title options,
# kept for switching back (the status bar is now hand-rolled below the tpm run):
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @theme_active_window_title   "#{?#{==:#{@claude_state},busy},#[fg=yellow]#{?#{@claude_spinner_frame},#{@claude_spinner_frame},✳} #[fg=#ffffff],}#{?#{==:#{@claude_state},waiting},#[fg=orange]󰂚 #[fg=#ffffff],}#W "
# set -g @theme_inactive_window_title "#{?#{==:#{@claude_state},busy},#[fg=yellow]#{?#{@claude_spinner_frame},#{@claude_spinner_frame},✳} #[fg=#ffffff],}#{?#{==:#{@claude_state},waiting},#[fg=orange]󰂚 #[fg=#ffffff],}#W "

# alternative theme (rose-pine), kept for switching back:
# set -g @plugin 'rose-pine/tmux'
# set -g @rose_pine_variant 'moon'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes


set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the --very bottom-- of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Hand-rolled status bar (kept below the tpm run line so it wins over
# anything a plugin sets). The palette comes from ~/.tmux/themes/<name>.conf,
# selected by the `theme` command (see .scripts/theme) via the
# ~/.config/theme/tmux-current.conf symlink; rose-pine is the fallback.
if-shell "test -r ~/.config/theme/tmux-current.conf" \
  "source-file ~/.config/theme/tmux-current.conf" \
  "source-file ~/.tmux/themes/rose-pine.conf"
source-file ~/.tmux/statusbar.conf

