# Hand-rolled status bar: rose-pine's minimal layout. Sourced by ~/.tmux.conf
# AFTER a palette file from ~/.tmux/themes/ - the C_* variables must already
# be set (tmux registers them in the global environment when the palette file
# is parsed, before this file's parse expands them).

# Claude Code activity indicator, shown inside the window name blocks.
# @claude_state is set per pane by ~/.claude/hooks/tmux-claude-status.sh
# (driven by Claude Code hooks): "busy" while working, "waiting" when it
# needs input, unset when idle. The braille frame is animated by
# ~/.claude/hooks/tmux-claude-spinner.sh (falls back to a static ✳).
set -g @claude_indicator "#{?#{==:#{@claude_state},busy},#[fg=$C_YELLOW]#{?#{@claude_spinner_frame},#{@claude_spinner_frame},✳} ,}#{?#{==:#{@claude_state},waiting},#[fg=$C_ORANGE]󰂚 ,}"

set -g status-style "fg=$C_FG,bg=$C_BG"
set -g status-left-length 100
set -g status-left "#[fg=$C_BG,bg=#{?client_prefix,$C_YELLOW,$C_BLUE}]  #S #[default]  "
set -g status-right-length 100
set -g status-right "#[fg=$C_GREEN,bg=$C_SURFACE]  #[fg=$C_FG]#(~/.tmux/status-git.sh '#{pane_current_path}') #[default] #[fg=$C_FG,bg=$C_SURFACE] 󰘚 #[fg=$C_FG_DARK]#(~/.tmux/status-cpu.sh) #[default] #[fg=$C_FG_DARK,bg=$C_SURFACE]  %a %d %b #[default] #[fg=$C_BG,bg=$C_BLUE]  %H:%M "

set-window-option -g window-status-separator " "
# Tab title lists every pane's command (" | "-separated); in multi-pane
# windows the active pane's command is highlighted in yellow. The Claude
# indicator renders inside the loop, next to the pane running Claude
# (@claude_state is pane-scoped).
set-window-option -g window-status-format "#[fg=$C_BG,bg=$C_GUTTER] #I #[bg=$C_SURFACE] #{P:#[fg=$C_FG_DARK]#{?pane_index, | ,}#{E:@claude_indicator}#{?#{&&:#{pane_active},#{e|>:#{window_panes},1}},#[fg=$C_YELLOW],#[fg=$C_FG_DARK]}#{pane_current_command}} "
set-window-option -g window-status-current-format "#[fg=$C_BG,bg=$C_YELLOW] #I #[bg=$C_SURFACE] #{P:#[fg=$C_FG]#{?pane_index, | ,}#{E:@claude_indicator}#{?#{&&:#{pane_active},#{e|>:#{window_panes},1}},#[fg=$C_YELLOW],#[fg=$C_FG]}#{pane_current_command}} "
