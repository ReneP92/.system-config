# rose-pine (moon) palette for the hand-rolled status bar (.tmux/statusbar.conf)
C_BG="#1f1d2e"        # bar background (matches terminal bg, darkened base)
C_SURFACE="#2a273f"   # window name blocks (surface)
C_GUTTER="#6e6a86"    # inactive window number blocks (muted)
C_FG="#e0def4"        # main text
C_FG_DARK="#908caa"   # inactive window names (subtle)
C_YELLOW="#f6c177"    # active window number block, busy spinner, prefix hint (gold)
C_ORANGE="#eb6f92"    # waiting bell (love)
C_BLUE="#9ccfd8"      # session block in status-left, time block in status-right (foam)
C_GREEN="#3e8fb0"     # git branch icon in status-right (pine)
