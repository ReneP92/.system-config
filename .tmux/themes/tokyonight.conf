# tokyonight-style custom palette for the hand-rolled status bar
# (matches the tokyonight variants in .wezterm.lua / nvim colorscheme)
C_BG="#011423"        # bar background (matches terminal bg)
C_SURFACE="#143652"   # window name blocks (bg_highlight)
C_GUTTER="#627E97"    # inactive window number blocks (fg_gutter)
C_FG="#CBE0F0"        # main text
C_FG_DARK="#B4D0E9"   # inactive window names
C_YELLOW="#FFDA7B"    # active window number block, busy spinner, prefix hint
C_ORANGE="#FF9E64"    # waiting bell
C_BLUE="#65D1FF"      # session block in status-left, time block in status-right
C_GREEN="#3EFFDC"     # git branch icon in status-right
